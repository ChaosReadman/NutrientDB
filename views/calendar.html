<div class="container">
    <header>
        <h1>食事カレンダー</h1>
    </header>

    <div class="grid">
        <!-- 食事記録リスト -->
        <div>
            <article>
                <header><strong>メニューを探す</strong></header>
                <div style="margin-bottom: 1rem; display: flex; gap: 20px;">
                    <label>
                        <input type="radio" name="search_scope" value="my" checked> マイレシピ
                    </label>
                    <label>
                        <input type="radio" name="search_scope" value="all"> 全レシピ
                    </label>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                    <input type="text" id="recipe-search-q" placeholder="レシピ名で検索...">
                    <button type="button" class="contrast" onclick="searchRecipes()">検索</button>
                </div>
                <div id="recipe-search-results" style="max-height: 200px; overflow-y: auto;">
                    <p><small>条件を入力して検索してください</small></p>
                </div>
            </article>

            <!-- 健康データ同期（スタブ） -->
            <article>
                <header><strong>健康データ同期</strong></header>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="outline" onclick="syncHealth()">Google Fit と同期する</button>
                    <form action="/api/health/disconnect" method="POST" style="margin:0;">
                        <button type="submit" class="outline secondary" style="font-size: 0.7rem; padding: 2px 10px; width: 100%;">
                            Google Fit との連携を解除する
                        </button>
                    </form>
                </div>
                <div id="health-result" style="margin-top: 10px; font-size: 0.9rem;"></div>
            </article>
        </div>

        <!-- メニュー登録フォーム -->
        <div>
            <article>
                <header><strong>日付の選択</strong></header>
                <form action="/calendar" method="GET" style="margin-bottom: 0;">
                    <input type="date" name="date" value="{{.Date}}" onchange="this.form.submit()">
                </form>
            </article>

            <article>
                <header><strong>記録済みメニュー</strong></header>
                {{if .Entries}}
                    {{range .Entries}}
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 8px 0;">
                        <div>
                            <mark style="font-size: 0.8rem;">
                                {{if eq .MealType "breakfast"}}朝食{{else if eq .MealType "lunch"}}昼食{{else if eq .MealType "dinner"}}夕食{{else}}間食{{end}}
                            </mark>
                            <a href="/recipe/{{.RecipeID}}" style="margin-left: 8px; font-size: 0.9rem;">{{.Title}}</a>
                        </div>
                    </div>
                    {{end}}
                {{else}}
                    <p><small>この日の記録はまだありません。</small></p>
                {{end}}
            </article>

            <article>
                <header><strong>メニューを登録する</strong></header>
                <form action="/calendar/add" method="POST" id="calendar-add-form">
                    <input type="hidden" name="date" value="{{.Date}}">
                    
                    <label for="meal_type">食事区分</label>
                    <select name="meal_type" required>
                        <option value="breakfast">朝食</option>
                        <option value="lunch" selected>昼食</option>
                        <option value="dinner">夕食</option>
                        <option value="snack">間食</option>
                    </select>

                    <button type="submit">カレンダーに追加</button>
                </form>
            </article>
        </div>
    </div>
</div>

<script>
async function syncHealth() {
    const resultDiv = document.getElementById('health-result');
    resultDiv.innerHTML = "<small>同期中...</small>";

    try {
        const res = await fetch('/api/health/sync');
        
        if (!res.ok) {
            const errorText = await res.text();
            resultDiv.innerHTML = `<span style="color: #e53935;">同期エラー: ${errorText}</span>`;
            return;
        }

        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            resultDiv.innerHTML = `<span style="color: #e53935;">エラー: セッションが切れた可能性があります。再ログインしてください。</span>`;
            return;
        }

        const data = await res.json();
        resultDiv.innerHTML = `🏃‍♂️ <strong>${data.steps}</strong> 歩 / 🔥 <strong>${data.burned_calories}</strong> kcal 消費`;
    } catch (err) {
        console.error("Health sync error:", err);
        resultDiv.innerHTML = `<span style="color: #e53935;">通信エラーが発生しました</span>`;
    }
}

async function searchRecipes() {
    const q = document.getElementById('recipe-search-q').value;
    const scope = document.querySelector('input[name="search_scope"]:checked').value;
    
    const res = await fetch(`/api/recipes/search?q=${encodeURIComponent(q)}&scope=${scope}`);
    const recipes = await res.json();
    
    const resultsDiv = document.getElementById('recipe-search-results');
    if (recipes.length === 0) {
        resultsDiv.innerHTML = '<p><small>該当するレシピがありません</small></p>';
        return;
    }

    resultsDiv.innerHTML = recipes.map(r => `
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
            <input type="checkbox" name="recipe_ids" value="${r.ID}" form="calendar-add-form">
            <label style="margin:0; font-size: 0.9rem;">${r.Title}</label>
        </div>
    `).join('');
}
</script>
